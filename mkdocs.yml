site_name: threat.wiki
site_description: Bastet threat intelligence and reference wiki
site_url: https://threat.wiki/
repo_url: https://github.com/bastet-ai/threat-wiki
repo_name: bastet-ai/threat-wiki
nav:
  - Home: index.md
  - Blog: blog/index.md
  - Ops:
      - CCleaner signed-update compromise: ops/ccleaner-signed-update-compromise.md
      - Barracuda ESG zero-day backdoor campaign: ops/barracuda-esg-zero-day-backdoor-campaign.md
      - Accellion FTA exploitation campaign: ops/accellion-fta-exploitation-campaign.md
      - 3CX desktop app compromise: ops/3cx-desktop-app-compromise.md
      - 0ktapus phishing campaign: ops/0ktapus-phishing-campaign.md
      - XZ Utils backdoor: ops/xz-utils-backdoor.md
      - tj-actions and reviewdog compromise: ops/tj-actions-reviewdog-compromise.md
      - Trivy compromise: ops/trivy-compromise.md
      - LiteLLM compromise: ops/litellm-compromise.md
      - Trivy → TeamPCP → CanisterWorm timeline: ops/trivy-lite-llm-compromise-timeline.md
  - Tools:
      - CanisterWorm: tools/canisterworm.md
  - Groups:
      - TeamPCP: actors/teampcp.md
  - People:
      - Overview: people/index.md
      - JiaT75: people/jiat75.md
  - Patterns:
      - Supply-chain group profile: patterns/supply-chain-actor-profile.md
  - Notes:
      - How to use this wiki: notes/how-to-use.md
      - Tag index: notes/tag-index.md
      - Motivation taxonomy: notes/motivation-taxonomy.md
      - Source index: notes/source-index.md
      - Editorial checklist: notes/editorial-checklist.md
theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
hooks:
  - hooks/tag_index.py
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
extra_css:
  - stylesheets/extra.css
